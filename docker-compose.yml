services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/backend/public:ro

  backend:
    build:
      context: ./backend
    environment:
      APP_NAME: "Favorites SPA"
      APP_ENV: local
      APP_KEY: "base64:9y8P28C4eEXnd6e3q2GUnP3nHcIv/VA5HhNLC9S6w7Y="
      APP_DEBUG: "true"
      APP_URL: http://localhost
      FRONTEND_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: test_spa
      DB_USERNAME: test_spa
      DB_PASSWORD: test_spa
      SESSION_DRIVER: database
      SESSION_DOMAIN: localhost
      SANCTUM_STATEFUL_DOMAINS: localhost,localhost:80,localhost:3000
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      MAIL_MAILER: log
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_API_BASE: http://localhost/api
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: test_spa
      MYSQL_USER: test_spa
      MYSQL_PASSWORD: test_spa
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
